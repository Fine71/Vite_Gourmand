<div class="hero-scene text-center text-white">
    <div class="text-center hero-scene-content">
        <h1>inscription</h1>
    </div>
</div>

<div class="container">
    <form>
        <div class="mb-3">
            <label for="nomInput" class="form-label">Nom</label>
            <input type="text" class="form-control" id="nomInput" placeholder="Votre nom">
            <div class="invalid-feedback">
                Veuillez entrer un nom valide.
            </div>
        </div>
        <div class="mb-3">
            <label for="prenomInput" class="form-label">Prénom</label>
            <input type="text" class="form-control" id="prenomInput" placeholder="Votre prénom">
            <div class="invalid-feedback">
                Veuillez entrer un prénom valide.
            </div>
        </div>
        <div class="mb-3">
            <label for="GSMInput" class="form-label">Numéro de GSM</label>
            <input type="text" class="form-control" id="GSMInput" placeholder="Votre numéro de GSM">
        </div>
        <div class="mb-3">
            <label for="emailInput" class="form-label">Email</label>
            <input type="email" class="form-control" id="emailInput" placeholder="Votre email">
            <div class="invalid-feedback">
                Veuillez entrer un email valide.
            </div>
        </div>
        <div class="mb-3">
            <label for="adresseInput" class="form-label">Adresse</label>
            <input type="text" class="form-control" id="adresseInput" placeholder="Votre adresse">
        </div>
        <div class="mb-3">
            <label for="passwordInput" class="form-label">Mot de passe</label>
            <input type="password" class="form-control" id="passwordInput" placeholder="Votre mot de passe">
            <div class="invalid-feedback">
                Veuillez entrer un mot de passe valide.
            </div>
            <div class="valid-feedback">
                Le mot de passe est valide.
            </div>
        </div>
        <div class="mb-3">
            <label for="validatePasswordInput" class="form-label">Confirmer le mot de passe</label>
            <input type="password" class="form-control" id="validatePasswordInput" placeholder="Confirmer votre mot de passe">
            <div class="invalid-feedback">
                Les mots de passe ne correspondent pas.
            </div>
        </div>
        <div class="text-center">
            <button type="submit" class="btn btn-primary" id="signupBtn">S'inscrire</button>
        </div>
        <div class="text-center pt-3">
            <p>Vous avez déjà un compte? <a href="/signin">Connectez-vous ici</a></p>
        </div>
    </form>
</div>
