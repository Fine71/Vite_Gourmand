<div class="hero-scene text-center text-white">
    <div class="text-center hero-scene-content">
        <h1>Contact</h1>
    </div>
</div>

<section class="contact-section">
    <article class="contact-article">
        <div class="container text-center">        
            <div class="col-12">
                <h2>Nous contacter</h2>
                <p>Pour toute question ou demande d'information, n'hésitez pas à nous contacter :</p>
                <ul>
                    <li>Email: contact@viteetgourmand.fr</li>
                    <li>Téléphone: 01 23 45 67 89</li>
                    <li>Adresse: 123 Rue de la Paix, 75000 Paris</li>
                </ul>
            </div>        
        </div>
    </article>
</section>

<section class="contact-form-section">
    <div class="container">
        <form class="contact-form">
            <div class="form-group">
                <label for="name">Nom :</label>
                <input type="text" class="form-control" id="name" name="name">
            </div>
            <div class="form-group">
                <label for="email">Email :</label>
                <input type="email" class="form-control" id="email" name="email">
            </div>
            <div class="form-group">
                <label for="message">Message :</label>
                <textarea class="form-control" id="message" name="message" rows="5"></textarea>
            </div>
            <div>
                <button type="submit" class="btn btn-primary">Envoyer</button>
            </div>
        </form>
    </div>
</section>
